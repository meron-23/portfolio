<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Main Interface Container -->
  <rect x="50" y="50" width="700" height="500" rx="8" fill="white" filter="url(#shadow)"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="700" height="80" rx="8" fill="#2c3e50"/>
  <text x="400" y="95" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">Fraud Detection System</text>
  
  <!-- Transaction Analysis -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Transaction Analysis:</text>
    
    <rect x="0" y="10" width="300" height="80" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#2c3e50">Transaction Details:</text>
    <text x="10" y="45" font-family="JetBrains Mono, monospace" font-size="10" fill="#6c757d">Amount: $2,847.32</text>
    <text x="10" y="58" font-family="JetBrains Mono, monospace" font-size="10" fill="#6c757d">Merchant: Electronics Store</text>
    <text x="10" y="71" font-family="JetBrains Mono, monospace" font-size="10" fill="#6c757d">Location: New York, NY</text>
    <text x="10" y="84" font-family="JetBrains Mono, monospace" font-size="10" fill="#6c757d">Time: 02:34 AM EST</text>
    
    <rect x="320" y="10" width="320" height="80" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
    <text x="330" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#c62828">Fraud Risk Score: 0.942</text>
    <text x="330" y="45" font-family="Inter, sans-serif" font-size="11" fill="#d32f2f">HIGH RISK - Action Required</text>
    <text x="330" y="60" font-family="Inter, sans-serif" font-size="10" fill="#ef5350">Recommendation: Block transaction</text>
    <text x="330" y="73" font-family="Inter, sans-serif" font-size="10" fill="#ef5350">Contact cardholder immediately</text>
    <text x="330" y="86" font-family="Inter, sans-serif" font-size="10" fill="#ef5350">Flag for manual review</text>
  </g>
  
  <!-- SHAP Explanation -->
  <g transform="translate(80, 260)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">SHAP Risk Factors:</text>
    
    <!-- High Risk Factors -->
    <rect x="0" y="10" width="200" height="30" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="11" fill="#c62828">Unusual amount (+0.34)</text>
    
    <rect x="210" y="10" width="200" height="30" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="220" y="30" font-family="Inter, sans-serif" font-size="11" fill="#c62828">Late night timing (+0.28)</text>
    
    <rect x="420" y="10" width="220" height="30" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="430" y="30" font-family="Inter, sans-serif" font-size="11" fill="#c62828">New merchant category (+0.22)</text>
    
    <rect x="0" y="50" width="200" height="30" rx="4" fill="#ffebee" stroke="#f44336" stroke-width="1"/>
    <text x="10" y="70" font-family="Inter, sans-serif" font-size="11" fill="#c62828">High velocity (+0.18)</text>
    
    <rect x="210" y="50" width="200" height="30" rx="4" fill="#e8f5e8" stroke="#4caf50" stroke-width="1"/>
    <text x="220" y="70" font-family="Inter, sans-serif" font-size="11" fill="#2e7d32">Regular customer (-0.12)</text>
    
    <rect x="420" y="50" width="220" height="30" rx="4" fill="#e8f5e8" stroke="#4caf50" stroke-width="1"/>
    <text x="430" y="70" font-family="Inter, sans-serif" font-size="11" fill="#2e7d32">Verified device (-0.08)</text>
  </g>
  
  <!-- Model Performance -->
  <g transform="translate(80, 360)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Model Performance:</text>
    
    <rect x="0" y="10" width="150" height="80" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1565c0">AUC-ROC</text>
    <text x="10" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1976d2">0.96</text>
    <text x="10" y="70" font-family="Inter, sans-serif" font-size="10" fill="#2196f3">Excellent</text>
    
    <rect x="160" y="10" width="150" height="80" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="170" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1565c0">Precision</text>
    <text x="170" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1976d2">0.94</text>
    <text x="170" y="70" font-family="Inter, sans-serif" font-size="10" fill="#2196f3">High</text>
    
    <rect x="320" y="10" width="150" height="80" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="330" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1565c0">Recall</text>
    <text x="330" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1976d2">0.91</text>
    <text x="330" y="70" font-family="Inter, sans-serif" font-size="10" fill="#2196f3">Good</text>
    
    <rect x="480" y="10" width="160" height="80" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="490" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#7b1fa2">F1-Score</text>
    <text x="490" y="50" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#9c27b0">0.925</text>
    <text x="490" y="70" font-family="Inter, sans-serif" font-size="10" fill="#9c27b0">Balanced</text>
  </g>
  
  <!-- Feature Engineering Pipeline -->
  <g transform="translate(80, 460)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Feature Pipeline:</text>
    
    <rect x="0" y="10" width="120" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="60" y="30" font-family="Inter, sans-serif" font-size="11" fill="#f57c00" text-anchor="middle">Raw Data</text>
    
    <path d="M 120 25 L 140 25" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="140" y="10" width="120" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="200" y="30" font-family="Inter, sans-serif" font-size="11" fill="#f57c00" text-anchor="middle">SMOTE</text>
    
    <path d="M 260 25 L 280 25" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="280" y="10" width="120" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="340" y="30" font-family="Inter, sans-serif" font-size="11" fill="#f57c00" text-anchor="middle">Features</text>
    
    <path d="M 400 25 L 420 25" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="420" y="10" width="120" height="30" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="480" y="30" font-family="Inter, sans-serif" font-size="11" fill="#f57c00" text-anchor="middle">XGBoost</text>
    
    <path d="M 540 25 L 560 25" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="560" y="10" width="120" height="30" rx="4" fill="#e8f5e8" stroke="#4caf50" stroke-width="1"/>
    <text x="620" y="30" font-family="Inter, sans-serif" font-size="11" fill="#388e3c" text-anchor="middle">SHAP</text>
  </g>
  
  <!-- Status Indicator -->
  <circle cx="720" cy="90" r="8" fill="#4caf50"/>
  <text x="680" y="95" font-family="Inter, sans-serif" font-size="10" fill="#4caf50">Monitoring</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d"/>
    </marker>
  </defs>
</svg>
