<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Main Interface Container -->
  <rect x="50" y="50" width="700" height="500" rx="8" fill="white" filter="url(#shadow)"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="700" height="80" rx="8" fill="#2c3e50"/>
  <text x="400" y="95" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">CrediTrust Complaint Intelligence</text>
  
  <!-- Market Selector -->
  <g transform="translate(80, 160)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Markets Served:</text>
    <rect x="0" y="10" width="80" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="40" y="30" font-family="Inter, sans-serif" font-size="12" fill="#1976d2" text-anchor="middle">Kenya</text>
    
    <rect x="90" y="10" width="80" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="130" y="30" font-family="Inter, sans-serif" font-size="12" fill="#1976d2" text-anchor="middle">Uganda</text>
    
    <rect x="180" y="10" width="80" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="220" y="30" font-family="Inter, sans-serif" font-size="12" fill="#1976d2" text-anchor="middle">Tanzania</text>
    
    <rect x="270" y="10" width="80" height="30" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="310" y="30" font-family="Inter, sans-serif" font-size="12" fill="#1976d2" text-anchor="middle">Rwanda</text>
  </g>
  
  <!-- Product Categories -->
  <g transform="translate(80, 220)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Product Analysis:</text>
    
    <rect x="0" y="10" width="100" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="50" y="30" font-family="Inter, sans-serif" font-size="12" fill="#7b1fa2" text-anchor="middle">Credit Cards</text>
    
    <rect x="110" y="10" width="100" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="160" y="30" font-family="Inter, sans-serif" font-size="12" fill="#7b1fa2" text-anchor="middle">BNPL</text>
    
    <rect x="220" y="10" width="100" height="30" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="270" y="30" font-family="Inter, sans-serif" font-size="12" fill="#7b1fa2" text-anchor="middle">Loans</text>
  </g>
  
  <!-- Search Interface -->
  <rect x="80" y="280" width="640" height="50" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="100" y="310" font-family="Inter, sans-serif" font-size="14" fill="#6c757d">Search complaints: "payment issues mobile banking"</text>
  
  <!-- Results Preview -->
  <g transform="translate(80, 350)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Insights Generated:</text>
    
    <rect x="0" y="10" width="640" height="80" rx="4" fill="#e8f5e8" stroke="#4caf50" stroke-width="1"/>
    <text x="10" y="30" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#2e7d32">Key Finding:</text>
    <text x="10" y="45" font-family="Inter, sans-serif" font-size="11" fill="#388e3c">• 42% increase in mobile payment complaints across Kenya and Uganda</text>
    <text x="10" y="60" font-family="Inter, sans-serif" font-size="11" fill="#388e3c">• Primary issue: Transaction failures during peak hours (2-6 PM)</text>
    <text x="10" y="75" font-family="Inter, sans-serif" font-size="11" fill="#388e3c">• Recommendation: Scale infrastructure during high-traffic periods</text>
  </g>
  
  <!-- Analytics Dashboard -->
  <g transform="translate(80, 450)">
    <rect x="0" y="0" width="200" height="80" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="10" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#e65100">Total Complaints</text>
    <text x="10" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#f57c00">524,893</text>
    <text x="10" y="55" font-family="Inter, sans-serif" font-size="10" fill="#ff9800">↑ 12% from last quarter</text>
    
    <rect x="220" y="0" width="200" height="80" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="1"/>
    <text x="230" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1565c0">Resolution Rate</text>
    <text x="230" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#1976d2">87.3%</text>
    <text x="230" y="55" font-family="Inter, sans-serif" font-size="10" fill="#2196f3">↑ 3.2% improvement</text>
    
    <rect x="440" y="0" width="200" height="80" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
    <text x="450" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#7b1fa2">AI Insights</text>
    <text x="450" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#9c27b0">1,247</text>
    <text x="450" y="55" font-family="Inter, sans-serif" font-size="10" fill="#9c27b0">Actionable recommendations</text>
  </g>
  
  <!-- Status Indicator -->
  <circle cx="720" cy="90" r="8" fill="#4caf50"/>
  <text x="680" y="95" font-family="Inter, sans-serif" font-size="10" fill="#4caf50">Live</text>
</svg>
