<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Main Interface Container -->
  <rect x="50" y="50" width="700" height="500" rx="8" fill="white" filter="url(#shadow)"/>
  
  <!-- Header -->
  <rect x="50" y="50" width="700" height="80" rx="8" fill="#2c3e50"/>
  <text x="400" y="95" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="white" text-anchor="middle">Self-RAG System</text>
  
  <!-- Query Input -->
  <rect x="80" y="160" width="640" height="50" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="100" y="190" font-family="Inter, sans-serif" font-size="14" fill="#6c757d">What are the key components of self-reflective RAG systems?</text>
  
  <!-- RAG Flow Visualization -->
  <g transform="translate(100, 240)">
    <!-- Retrieval -->
    <rect x="0" y="0" width="120" height="60" rx="4" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
    <text x="60" y="35" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#1976d2" text-anchor="middle">Retrieval</text>
    
    <!-- Arrow -->
    <path d="M 120 30 L 160 30" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Generation -->
    <rect x="160" y="0" width="120" height="60" rx="4" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
    <text x="220" y="35" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#7b1fa2" text-anchor="middle">Generation</text>
    
    <!-- Arrow -->
    <path d="M 280 30 L 320 30" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Critics -->
    <rect x="320" y="0" width="120" height="60" rx="4" fill="#e8f5e8" stroke="#4caf50" stroke-width="2"/>
    <text x="380" y="35" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#388e3c" text-anchor="middle">Critics</text>
    
    <!-- Arrow -->
    <path d="M 440 30 L 480 30" stroke="#6c757d" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <!-- Reflection -->
    <rect x="480" y="0" width="120" height="60" rx="4" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
    <text x="540" y="35" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#f57c00" text-anchor="middle">Reflection</text>
  </g>
  
  <!-- Critic Details -->
  <g transform="translate(100, 330)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2c3e50">Active Critics:</text>
    
    <rect x="0" y="10" width="140" height="30" rx="4" fill="#eef2f6"/>
    <text x="10" y="30" font-family="JetBrains Mono, monospace" font-size="11" fill="#2c3e50">Retrieval Critic</text>
    
    <rect x="150" y="10" width="140" height="30" rx="4" fill="#eef2f6"/>
    <text x="160" y="30" font-family="JetBrains Mono, monospace" font-size="11" fill="#2c3e50">Support Critic</text>
    
    <rect x="300" y="10" width="140" height="30" rx="4" fill="#eef2f6"/>
    <text x="310" y="30" font-family="JetBrains Mono, monospace" font-size="11" fill="#2c3e50">Completeness Critic</text>
  </g>
  
  <!-- Response Area -->
  <rect x="80" y="400" width="640" height="120" rx="4" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>
  <text x="100" y="425" font-family="Inter, sans-serif" font-size="12" font-weight="500" fill="#2c3e50">Self-Reflective Response:</text>
  <text x="100" y="445" font-family="Inter, sans-serif" font-size="11" fill="#6c757d">The key components include: 1) Retrieval system for relevant documents, 2) Language model</text>
  <text x="100" y="460" font-family="Inter, sans-serif" font-size="11" fill="#6c757d">for answer generation, 3) Multiple critic modules for quality assessment, 4) Reflection mechanism</text>
  <text x="100" y="475" font-family="Inter, sans-serif" font-size="11" fill="#6c757d">for iterative improvement, and 5) Reasoning trace transparency for explainability.</text>
  
  <!-- Status Indicators -->
  <circle cx="720" cy="90" r="8" fill="#4caf50"/>
  <text x="680" y="95" font-family="Inter, sans-serif" font-size="10" fill="#4caf50">Active</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c757d"/>
    </marker>
  </defs>
</svg>
